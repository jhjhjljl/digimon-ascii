<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>digimon ascii</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <style>
    :root {
      --yellow: rgb(252, 250, 15);
      --orange: rgb(237, 111, 44);
      --black: rgb(000, 000, 000);
      --navy: rgb(21, 57, 105);
    }
    body {
      background-color: var(--navy);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    pre {
      color: var(--yellow);
      font-size: 7px;
      line-height: 0.465;
      white-space: pre;
      font-family: "SF Mono";
    }
    #click-to-play {
      color: var(--yellow);
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="click-to-play">click to play (wip)</div>
  <pre id="canvas" style="display:none"></pre>
  <audio id="audio" src="assets/digimon/wargreymon.aac"></audio>
  <script>
    const canvas = document.getElementById("canvas");
    const prompt = document.getElementById("click-to-play");
    const audio = document.getElementById("audio");

    async function main() {
      const r = await fetch("assets/digimon/wargreymon.json");
      const frames = await r.json();

      document.addEventListener("click", () => {
        prompt.style.display = "none";
        canvas.style.display = "block";
        audio.play();
        startAnimation(frames);
      }, { once: true });
    }

    function startAnimation(frames) {
      let i = 0;

      function nextFrame() {
        if (i >= frames.length) {
          canvas.style.display = "none";
          prompt.style.display = "block";
          document.addEventListener("click", () => {
            prompt.style.display = "none";
            canvas.style.display = "block";
            audio.currentTime = 0;
            audio.play();
            startAnimation(frames);
          }, { once: true });
          return;
        }
        canvas.textContent = frames[i];
        i++;
        setTimeout(nextFrame, 1000 / 23.976);
      }

      nextFrame();
    }

    main();
  </script>
</body>
</html>
